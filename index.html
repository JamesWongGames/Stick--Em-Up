<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick' Em Up!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Stick' Em Up!</h1>
  <nav>
    <a href="index.html">Butik</a>
    <a href="contact.html">Kontakt os</a>
  </nav>
  <button class="cart-btn" onclick="toggleCart()">🛒 Kurv (<span id="cart-count">0</span>)</button>
</header>

<div class="cart-drawer" id="cart-drawer">
  <h3>Din kurv</h3>
  <div id="cart-items"></div>
  <p class="cart-total">I alt: <span id="cart-total">0.00</span> DKK</p>
  <button class="checkout-btn">Gå til betaling</button>
</div>

<div class="shop-header">
  <div class="filters">
    <a href="index.html"><button class="filter-btn active">Alle</button></a>
    <a href="cute.html"><button class="filter-btn">Søde</button></a>
    <a href="space.html"><button class="filter-btn">Rummet</button></a>
  </div>
</div>

<div class="grid">

  <a href="sleeping-star.html" class="card-link">
    <div class="card">
      <div class="img-wrap">
        <img src="Sleeping Star.png" alt="Sleeping Star">
      </div>
      <div class="card-body">
        <h2>Sleeping Star</h2>
        <p class="price">10 DKK</p>
      </div>
    </div>
  </a>

  <a href="blue-ghost.html" class="card-link">
    <div class="card">
      <div class="img-wrap">
        <img src="Blue Ghost.png" alt="Blue Ghost">
      </div>
      <div class="card-body">
        <h2>Blue Ghost</h2>
        <p class="price">15 DKK</p>
      </div>
    </div>
  </a>

  <a href="galaxy-duck.html" class="card-link">
    <div class="card">
      <div class="img-wrap">
        <img src="Galaxy Duck.png" alt="Galaxy Duck">
      </div>
      <div class="card-body">
        <h2>Galaxy Duck</h2>
        <p class="price">15 DKK</p>
      </div>
    </div>
  </a>

  <a href="pixel-cat.html" class="card-link">
    <div class="card">
      <div class="img-wrap">
        <img src="Pixel Cat.png" alt="Pixel Cat">
      </div>
      <div class="card-body">
        <h2>Pixel Cat</h2>
        <p class="price">10 DKK</p>
      </div>
    </div>
  </a>

</div>

<script>
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  function removeFromCart(name) {
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
  }

  function updateCart() {
    document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cart-total').textContent =
      cart.reduce((sum, i) => sum + i.price * i.qty, 0).toFixed(2);

    const list = document.getElementById('cart-items');
    list.innerHTML = cart.length === 0
      ? '<p class="empty">Din kurv er tom.</p>'
      : cart.map(i => `
          <div class="cart-item">
            <span>${i.name} x${i.qty}</span>
            <span>${(i.price * i.qty).toFixed(2)} DKK</span>
            <button onclick="removeFromCart('${i.name}')">✕</button>
          </div>
        `).join('');
  }

  function toggleCart() {
    document.getElementById('cart-drawer').classList.toggle('open');
  }

  updateCart();
</script>

</body>
</html>
