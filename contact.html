<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Stick ’Em Up!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Stick ’Em Up!</h1>
  <nav>
    <a href="index.html">Butik</a>
    <a href="contact.html">Kontakt os</a>
  </nav>
  <button class="cart-btn" onclick="toggleCart()">🛒 Kurv (<span id="cart-count">0</span>)</button>
</header>

<div class="cart-drawer" id="cart-drawer">
  <h3>Din kurv</h3>
  <div id="cart-items"></div>
  <p class="cart-total">I alt: $<span id="cart-total">0.00</span></p>
  <button class="checkout-btn">Gå til betaling</button>
</div>

<div class="contact-page">
  <h1>Kontakt os</h1>
  <p class="contact-intro">Har du et spørgsmål eller et problem? Skriv til os, så svarer vi inden for 24 timer.</p>

  <form class="contact-form" action="https://formspree.io/f/mjgqrojn" method="POST" onsubmit="handleSubmit(event)">

    <div class="form-group">
      <label for="name">Dit navn</label>
      <input type="text" id="name" name="name" placeholder="Navn" required>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="_replyto" placeholder="mail@eksempel.dk" required>
    </div>

    <div class="form-group">
      <label for="subject">Emne</label>
      <select id="subject" name="subject">
        <option value="">Vælg et emne</option>
        <option value="Order issue">Ordreproblem</option>
        <option value="Shipping question">Forsendelse</option>
        <option value="Product question">Produkt</option>
        <option value="Other">Andet</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Besked</label>
      <textarea id="message" name="message" rows="5" placeholder="Skriv din besked..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send besked</button>

    <p class="form-success" id="form-success">Tak! Vi vender tilbage snart.</p>

  </form>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(res => {
      if (res.ok) {
        form.reset();
        document.getElementById('form-success').style.display = 'block';
      }
    });
  }

  function removeFromCart(name) {
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
  }

  function updateCart() {
    document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cart-total').textContent =
      cart.reduce((sum, i) => sum + i.price * i.qty, 0).toFixed(2);

    const list = document.getElementById('cart-items');
    list.innerHTML = cart.length === 0
      ? '<p class="empty">Din kurv er tom.</p>'
      : cart.map(i => `
          <div class="cart-item">
            <span>${i.name} x${i.qty}</span>
            <span>$${(i.price * i.qty).toFixed(2)}</span>
            <button onclick="removeFromCart('${i.name}')">✕</button>
          </div>
        `).join('');
  }

  function toggleCart() {
    document.getElementById('cart-drawer').classList.toggle('open');
  }

  updateCart();
</script>

</body>
</html>
