<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleeping Star – Stick' Em Up!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Stick' Em Up!</h1>
  <nav>
    <a href="index.html">Butik</a>
    <a href="contact.html">Kontakt os</a>
  </nav>
  <button class="cart-btn" onclick="toggleCart()">🛒 Kurv (<span id="cart-count">0</span>)</button>
</header>

<div class="cart-drawer" id="cart-drawer">
  <h3>Din kurv</h3>
  <div id="cart-items"></div>
  <p class="cart-total">I alt: <span id="cart-total">0.00</span> DKK</p>
  <button class="checkout-btn">Gå til betaling</button>
</div>

<div class="product-page">

  <a href="index.html" class="back-link">← Tilbage til butikken</a>

  <div class="product-layout">

    <div class="product-image">
      <img src="Sleeping Star.png" alt="Sleeping Star">
    </div>

    <div class="product-info">
      <h1>Sleeping Star</h1>
      <p class="product-price">10 DKK</p>
      <p class="product-desc">En sød lille stjerne der får sig en god nats søvn.</p>

      <ul class="product-details">
        <li>Perfekt til at dekorere dine ting</li>
        <li>Vandtæt vinyl</li>
        <li>Let til at sætte på og fjerne</li>
      </ul>

      <button class="add-btn-large" onclick="addToCart('Sleeping Star', 10.00)">Tilføj til kurv</button>
    </div>

  </div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem('cart') || '[]');

function addToCart(name, price) {
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  if (total >= 10) {
    alert('Du kan kun bestille 10 stickers ad gangen.');
    return;
  }
  const existing = cart.find(item => item.name === name);
  if (existing) existing.qty++;
  else cart.push({ name, price, qty: 1 });

  localStorage.setItem('cart', JSON.stringify(cart));
  updateCart();

  const btn = document.querySelector('.add-btn-large');
  btn.textContent = 'Tilføjet!';
  setTimeout(() => btn.textContent = 'Tilføj til kurv', 1500);
}

function removeFromCart(name) {
  cart = cart.filter(item => item.name !== name);
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCart();
}

function updateCart() {
  document.getElementById('cart-count').textContent =
    cart.reduce((sum, i) => sum + i.qty, 0);

  document.getElementById('cart-total').textContent =
    cart.reduce((sum, i) => sum + i.price * i.qty, 0).toFixed(2);

  const list = document.getElementById('cart-items');
  list.innerHTML = cart.length === 0
    ? '<p class="empty">Din kurv er tom.</p>'
    : cart.map(i => `
      <div class="cart-item">
        <span>${i.name} x${i.qty}</span>
        <span>${(i.price * i.qty).toFixed(2)} DKK</span>
        <button onclick="removeFromCart('${i.name}')">✕</button>
      </div>
    `).join('');
}

function toggleCart() {
  document.getElementById('cart-drawer').classList.toggle('open');
}

updateCart();
</script>

</body>
</html>
