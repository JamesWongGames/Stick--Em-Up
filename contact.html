<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – Stick em’ up!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>Stick em’ up!</h1>
  <nav>
    <a href="index.html">Shop</a>
    <a href="contact.html">Contact us</a>
  </nav>
  <button class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<div class="cart-drawer" id="cart-drawer">
  <h3>Your cart</h3>
  <div id="cart-items"></div>
  <p class="cart-total">Total: $<span id="cart-total">0.00</span></p>
  <button class="checkout-btn">Checkout</button>
</div>

<div class="contact-page">
  <h1>Contact us</h1>
  <p class="contact-intro">Have a question or issue with your order? Fill out the form below and we'll get back to you within 24 hours.</p>

  <form class="contact-form" action="https://formspree.io/f/mjgqrojn" method="POST" onsubmit="handleSubmit(event)">

    <div class="form-group">
      <label for="name">Your name</label>
      <input type="text" id="name" name="name" placeholder="Jane Smith" required>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="_replyto" placeholder="jane@example.com" required>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <select id="subject" name="subject">
        <option value="">Select a topic</option>
        <option value="Order issue">Order issue</option>
        <option value="Shipping question">Shipping question</option>
        <option value="Product question">Product question</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Tell us what's on your mind..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send message</button>

    <p class="form-success" id="form-success">Thanks! We'll get back to you soon.</p>

  </form>
</div>

<script>
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(res => {
      if (res.ok) {
        form.reset();
        document.getElementById('form-success').style.display = 'block';
      }
    });
  }

  function removeFromCart(name) {
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCart();
  }

  function updateCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
    document.getElementById('cart-total').textContent = cart.reduce((sum, i) => sum + i.price * i.qty, 0).toFixed(2);
    const list = document.getElementById('cart-items');
    list.innerHTML = cart.length === 0
      ? '<p class="empty">Your cart is empty.</p>'
      : cart.map(i => `
          <div class="cart-item">
            <span>${i.name} x${i.qty}</span>
            <span>$${(i.price * i.qty).toFixed(2)}</span>
            <button onclick="removeFromCart('${i.name}')">✕</button>
          </div>
        `).join('');
  }

  function toggleCart() {
    document.getElementById('cart-drawer').classList.toggle('open');
  }

  updateCart();
</script>

</body>
</html>
